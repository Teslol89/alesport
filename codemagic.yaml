workflows:
  ionic-ios:
    name: Ionic iOS Build

    environment:
      node: 22.14.0

      groups:
        - ios   # 👈 variables (TEAM_ID, API KEY, etc.)

    working_directory: mobile/alesport-app

    scripts:
      # Instalar dependencias
      - name: Install dependencies
        script: npm install --legacy-peer-deps

      # Build web (Vite → dist)
      - name: Build web app
        script: npm run build

      # Preparar proyecto iOS nativo sin perder configuración manual
      - name: Prepare iOS project
        script: |
          # Usar la CLI local del proyecto para evitar incompatibilidades en CI
          npx cap --version

          if [ ! -d ios/App ]; then
            npx cap add ios
          fi

          if [ -n "$GOOGLE_SERVICE_INFO_PLIST_BASE64" ]; then
            echo "$GOOGLE_SERVICE_INFO_PLIST_BASE64" | base64 --decode > ios/App/App/GoogleService-Info.plist
            plutil -lint ios/App/App/GoogleService-Info.plist
          fi

      # Sincronizar Capacitor
      - name: Sync Capacitor
        script: |
          npx cap sync ios
          cd ios/App
          xcodebuild -resolvePackageDependencies -project App.xcodeproj -scheme App

      # Build (archive)
      - name: Build iOS
        script: |
          cd ios/App

          # Crear archivo .p8 desde base64
          echo "$APP_STORE_CONNECT_PRIVATE_KEY" | base64 --decode > key.p8

          xcodebuild -project App.xcodeproj \
          -scheme App \
          -configuration Release \
          -sdk iphoneos \
          DEVELOPMENT_TEAM=$APPLE_TEAM_ID \
          CODE_SIGN_STYLE=Automatic \
          -allowProvisioningUpdates \
          -authenticationKeyPath "$PWD/key.p8" \
          -authenticationKeyID $APP_STORE_CONNECT_KEY_IDENTIFIER \
          -authenticationKeyIssuerID $APP_STORE_CONNECT_ISSUER_ID \
          -archivePath $CM_BUILD_DIR/App.xcarchive \
          archive

      # Exportar IPA para App Store / TestFlight
      - name: Export IPA
        script: |
          cd ios/App

          cat > ExportOptions.plist <<EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>method</key>
              <string>app-store-connect</string>
              <key>signingStyle</key>
              <string>automatic</string>
              <key>destination</key>
              <string>export</string>
              <key>compileBitcode</key>
              <false/>
          </dict>
          </plist>
          EOF

          xcodebuild -exportArchive \
          -archivePath $CM_BUILD_DIR/App.xcarchive \
          -exportOptionsPlist ExportOptions.plist \
          -exportPath $CM_BUILD_DIR/build

    artifacts:
      - $CM_BUILD_DIR/build/*.ipa