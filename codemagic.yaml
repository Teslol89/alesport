workflows:
  ios-ipa:
    name: Alesport iOS IPA
    max_build_duration: 120
    instance_type: mac_mini_m2

    environment:
      node: 22.14.0
      xcode: latest
      cocoapods: default
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.alesport.app
      vars:
        APP_ROOT: mobile/alesport-app

    scripts:
      - name: Install dependencies
        script: |
          cd "$CM_BUILD_DIR/$APP_ROOT"
          npm ci

      - name: Build web app
        script: |
          cd "$CM_BUILD_DIR/$APP_ROOT"
          npm run build

      - name: Sync Capacitor iOS
        script: |
          cd "$CM_BUILD_DIR/$APP_ROOT"
          npx cap sync ios

      - name: Apply signing profiles
        script: |
          cd "$CM_BUILD_DIR/$APP_ROOT/ios/App"
          xcode-project use-profiles --project App.xcodeproj

      - name: Build signed IPA
        script: |
          cd "$CM_BUILD_DIR/$APP_ROOT/ios/App"
          xcode-project build-ipa --project App.xcodeproj --scheme App

    artifacts:
      - "mobile/alesport-app/build/ios/ipa/*.ipa"
      - "/tmp/xcodebuild_logs/*.log"
      - "$HOME/Library/Developer/Xcode/DerivedData/**/Build/**/*.app"
      - "$HOME/Library/Developer/Xcode/DerivedData/**/Build/**/*.dSYM"
