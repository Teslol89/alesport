name: Backend Tests

on:
  push:
    branches: [ main, "feat/*", "fix/*", "chore/*" ]
  pull_request:
    branches: [ main ]

jobs:
  test-backend:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: alesport
          POSTGRES_PASSWORD: alesport
          POSTGRES_DB: alesport_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U alesport" --health-interval 10s --health-timeout 5s --health-retries 5
    env:
      DATABASE_URL: postgresql://alesport:alesport@localhost:5432/alesport_test
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt
      - name: Wait for Postgres
        run: |
          until pg_isready -h localhost -U alesport; do sleep 1; done
      - name: Run DB migrations (si usas Alembic, descomenta)
        run: |
          echo "No migrations configuradas aún"
        # alembic upgrade head
      - name: Seed de datos (opcional)
        run: |
          python backend/seed.py || echo "No seed.py o no necesario"
      - name: Run backend tests
        run: |
          python backend/test_manual.py