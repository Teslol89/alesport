workflows:
  ionic-ios:
    name: Ionic iOS Build
    max_build_duration: 60

    environment:
      node: latest

    working_directory: mobile/alesport-app

    scripts:
      # Instalar dependencias (con fix de conflictos)
      - name: Install dependencies
        script: npm install --legacy-peer-deps

      # Build web (Vite → genera dist)
      - name: Build web app
        script: npm run build

      # Limpiar iOS por si hay basura
      - name: Clean iOS
        script: rm -rf ios

      # Crear proyecto iOS
      - name: Add iOS platform
        script: |
          npm install -g @capacitor/cli
          npx cap add ios

      # Sincronizar Capacitor
      - name: Sync Capacitor
        script: npx cap sync ios

      # Debug (puedes borrarlo luego)
      - name: Check iOS structure
        script: |
          ls ios
          ls ios/App

      # Build iOS (SIN CocoaPods, usando xcodeproj)
      - name: Build iOS
        script: |
          cd ios/App
          xcodebuild -project App.xcodeproj \
          -scheme App \
          -configuration Release \
          -sdk iphoneos \
          -archivePath $CM_BUILD_DIR/App.xcarchive archive

    artifacts:
      - mobile/alesport-app/ios/App/build/**/*.ipa