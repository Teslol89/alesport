workflows:
  ionic-ios:
    name: Ionic iOS Build

    environment:
      node: 22.14.0
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.alesport.app

      groups:
        - ios

    working_directory: mobile/alesport-app

    scripts:
      - name: Install dependencies
        script: npm install --legacy-peer-deps

      - name: Build web app
        script: npm run build

      - name: Prepare iOS project
        script: |
          npx cap --version

          if [ ! -d ios/App ]; then
            npx cap add ios
          fi

          if [ -n "$GOOGLE_SERVICE_INFO_PLIST_BASE64" ]; then
            echo "$GOOGLE_SERVICE_INFO_PLIST_BASE64" | base64 --decode > ios/App/App/GoogleService-Info.plist
            plutil -lint ios/App/App/GoogleService-Info.plist
          fi

      - name: Sync Capacitor
        script: |
          npx cap sync ios
          cd ios/App
          xcodebuild -resolvePackageDependencies -project App.xcodeproj -scheme App

      - name: Use Codemagic signing profiles
        script: |
          cd ios/App
          xcode-project use-profiles \
            --project App.xcodeproj \
            --archive-method app-store \
            --export-options-plist "$CM_BUILD_DIR/export_options.plist"

      - name: Build iOS
        script: |
          cd ios/App

          xcodebuild -project App.xcodeproj \
          -scheme App \
          -configuration Release \
          -sdk iphoneos \
          DEVELOPMENT_TEAM=$APPLE_TEAM_ID \
          -archivePath $CM_BUILD_DIR/App.xcarchive \
          archive

      - name: Export IPA
        script: |
          cd ios/App

          xcodebuild -exportArchive \
          -archivePath $CM_BUILD_DIR/App.xcarchive \
          -exportOptionsPlist "$CM_BUILD_DIR/export_options.plist" \
          -exportPath $CM_BUILD_DIR/build

    artifacts:
      - $CM_BUILD_DIR/build/*.ipa

    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true