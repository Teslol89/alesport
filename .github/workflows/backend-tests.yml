name: Backend Tests

on:
  push:
    branches: [ main, "feat/*", "fix/*", "chore/*" ]
  pull_request:
    branches: [ main ]

jobs:
  test-backend:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: alesport
          POSTGRES_PASSWORD: alesport
          POSTGRES_DB: alesport_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U alesport" --health-interval 10s --health-timeout 5s --health-retries 5
    env:
      DATABASE_URL: postgresql://alesport:alesport@localhost:5432/alesport_test
      API_BASE_URL: http://127.0.0.1:8000/api
    steps:
      - uses: actions/checkout@v4
      - name: Crear .env dummy para CI (raíz y backend)
        run: |
          echo "JWT_SECRET_KEY=devsecret" > .env
          echo "JWT_ALGORITHM=HS256" >> .env
          echo "JWT_EXPIRE_MINUTES=30" >> .env
          echo "DATABASE_URL=postgresql://alesport:alesport@localhost:5432/alesport_test" >> .env
          mkdir -p backend
          cp .env backend/.env
        working-directory: ${{ github.workspace }}
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt
      - name: Wait for Postgres
        run: |
          until pg_isready -h localhost -U alesport; do sleep 1; done
      - name: Run DB migrations (si usas Alembic, descomenta)
        run: |
          echo "No migrations configuradas aún"
        # alembic upgrade head
      - name: Seed de datos (opcional)
        run: |
          python backend/seed.py || echo "No seed.py o no necesario"
      - name: Mostrar contenido de main.py y ruta de trabajo
        run: |
          pwd
          ls -l
          cat main.py
        working-directory: backend/app
      - name: Start backend (Uvicorn)
        run: |
          uvicorn app.main:app --host 127.0.0.1 --port 8000 --reload --log-level debug > /tmp/uvicorn.log 2>&1 &
        working-directory: backend
      - name: Wait for backend to be ready
        run: |
          for i in {1..15}; do
            if nc -z 127.0.0.1 8000; then
              echo "Backend is up!"
              break
            fi
            echo "Waiting for backend..."
            sleep 2
          done
      - name: Mostrar procesos y logs de Uvicorn
        run: |
          ps aux
          cat /tmp/uvicorn.log || echo "No log file"
        continue-on-error: true
      - name: Run backend tests
        run: python test_manual.py
        working-directory: backend