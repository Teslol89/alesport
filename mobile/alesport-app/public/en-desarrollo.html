<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Verdeguer Labs · En desarrollo</title>
    <style>
      :root {
        color-scheme: light;
        font-family: 'Open Sans', Arial, sans-serif;
      }
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: linear-gradient(160deg, #f4fbff 0%, #eef3f8 100%);
        color: #12313a;
      }
      .card {
        width: min(92vw, 560px);
        background: #ffffff;
        border-radius: 18px;
        box-shadow: 0 18px 40px rgba(11, 45, 52, 0.14);
        padding: 2rem 1.4rem;
        text-align: center;
      }
      h1 {
        margin: 0 0 0.75rem;
        font-size: clamp(1.7rem, 2vw + 1rem, 2.3rem);
      }
      p {
        margin: 0.5rem 0;
        line-height: 1.55;
        color: #49656c;
      }
      .badge {
        display: inline-block;
        margin-bottom: 1rem;
        padding: 0.35rem 0.7rem;
        border-radius: 999px;
        background: rgba(0, 137, 166, 0.12);
        color: #0089a6;
        font-weight: 700;
        letter-spacing: 0.02em;
      }
      a {
        color: #0089a6;
        font-weight: 600;
      }
    </style>
  </head>
  <body>
    <main class="card">
      <div class="badge">Web en desarrollo</div>
      <h1>Estamos preparando la nueva web de Verdeguer Labs</h1>
      <p>Muy pronto esta página mostrará la web oficial.</p>
      <p>Mientras tanto, si necesitas ayuda puedes escribir a <a href="mailto:verdeguerlabs@verdeguerlabs.es">verdeguerlabs@verdeguerlabs.es</a>.</p>
    </main>
  </body>
</html>
